<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer | Loading</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        #videoContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
        }
        #introVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
       #skipBtn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 15px 30px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 2px solid #4361ee;
            border-radius: 50px;
            cursor: pointer;
            z-index: 10000;
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4);
       }
    </style>
</head>
<body>
    <div id="videoContainer">
        <video id="introVideo" muted playsinline>
            <source src="{{ url_for('static', filename='videos/intro.mp4') }}" type="video/mp4">
        </video>
        <button id="skipBtn">Skip Intro</button>
    </div>

    <script>
    const video = document.getElementById('introVideo');
    const skipBtn = document.getElementById('skipBtn');

    // Try autoplay
    video.play().catch(() => {
        skipBtn.textContent = 'Play Intro';
        skipBtn.onclick = () => {
            video.play();
            skipBtn.textContent = 'Skip Intro';
        };
    });

   // Skip button goes directly to login
   skipBtn.addEventListener('click', function() {
       window.location.href = "{{ url_for('login') }}";
   });

   // Video event listeners
   video.onended = function() {
    window.location.href = "{{ url_for('login') }}";
};
</script>
</body>
</html>

<!-- templates/feedback_negative.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>We're Listening</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Raleway', sans-serif;
            background: #fff3f3;
            color: #333;
            text-align: center;
            padding: 60px 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 650px;
            margin: auto;
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.1);
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            color: #d9534f;
        }
        .emoji {
            font-size: 4em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">😔</div>
        <h1>We're sorry, {{ name }}.</h1>
        <p>Your feedback matters, and we're working hard to improve based on your input.</p>
        <p>Thank you for helping us make Resume Matcher better! ❤️</p>
        <button class="btn" onclick="window.location.href='/matcher'">Back to Matcher</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Resume Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    * {
        box-sizing: border-box;
    }

    body.login-page {
        margin: 0;
        padding: 0;
        background: url("{{ url_for('static', filename='images/resume-bg.jpg') }}") no-repeat center center fixed;
        background-size: cover;
        font-family: 'Segoe UI', sans-serif;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
        font-size: 1rem;
    }

    .container {
        display: flex;
        width: 90%;
        max-width: 1000px;
        background-color: rgba(255, 255, 255, 0.85); /* Increased opacity */
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        backdrop-filter: blur(6px);
    }

    .video-section {
        flex: 1;
        min-width: 50%;
    }

    .video-section video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .form-container {
        flex: 1;
        padding: 40px;
        background-color: rgba(255, 255, 255, 0.85); /* Increased opacity */
        display: flex;
        flex-direction: column;
        justify-content: center;
        font-size: 1rem;
    }

    .form-card h2 {
        font-size: 2.2rem; /* Increased from original */
        margin-bottom: 15px;
        color: #2c3e50;
    }

    .form-card p {
        font-size: 1.1rem; /* Increased from 14px */
        margin-bottom: 30px; /* Increased spacing */
        color: #555;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 16px; /* Increased padding */
        font-size: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        background-color: #fff;
        transition: border 0.3s;
        margin: 8px 0 15px 0; /* Better spacing */
        font-weight: 600; /* Makes entered text bold */
    }

    input:focus {
        border-color: #4b6cb7;
        outline: none;
    }

    .form-options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 15px;
        margin: 15px 0; /* Better spacing */
    }



    .remember-me {
        display: flex;
        align-items: center;
        font-size: 20px; /* Increased from 15px */
        font-weight: 700;
    }

    .remember-me input {
        margin-right: 8px;
    }

    .forgot-password {
        color: #182848;
        font-weight: 700;
        text-decoration: none;
        font-size: 20px !important;
    }

    .forgot-password:hover {
        text-decoration: underline;
    }

    .login-btn {
        width: 100%;
        padding: 16px; /* Increased padding */
        margin-top: 10px;
        background: linear-gradient(90deg, #4b6cb7, #182848);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1.1rem; /* Increased font size */
        transition: all 0.3s;
    }

    .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .register-prompt {
        margin-top: 25px; /* Increased spacing */
        text-align: center;
        font-size: 22px !important; /* Increased from default */
        font-weight: 600;
    }

    .register-prompt a {
        color: #182848;
        font-weight: 700; /* Made bolder */
        text-decoration: none;
        font-size: 21px;
    }

    .register-prompt a:hover {
        text-decoration: underline;
    }

    .password-container {
            position: relative;
            margin-bottom: 15px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #555;
        }

    @media (max-width: 768px) {
        .container {
            flex-direction: column;
            height: auto;
        }

        .video-section {
            height: 200px;
        }

        .form-container {
            padding: 30px 20px;
        }
    }

</style>
</head>
<body class="login-page">
    <div class="container">
        <div class="video-section">
            <video autoplay muted loop playsinline>
                <source src="{{ url_for('static', filename='videos/analyzer.mp4') }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="form-container">
            <div class="form-card">
                <h2>Welcome Back</h2>
                <p>Login to access your Resume Analyzer dashboard</p>
                <form method="POST" action="/login">
                    {% with messages = get_flashed_messages(category_filter=["login-error"]) %}
                        {% if messages %}
                            <div class="alert alert-danger" style="
                                padding: 15px;
                                margin-bottom: 20px;
                                border: 1px solid #f5c6cb;
                                background-color: #f8d7da;
                                color: #721c24;
                                border-radius: 8px;
                                text-align: center;
                            ">
                                {{ messages[0] }}
                            </div>
                        {% endif %}
                    {% endwith %}
                    <input type="text" name="login" placeholder="Email or Username" required>
                    <div class="password-container" style="position: relative;">
                        <input type="password" name="password" id="loginPassword" placeholder="Password" required>
                        <i class="fas fa-eye-slash toggle-password"
                           style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer;"></i>
                    </div>

                    <div class="form-options">
                        <label class="remember-me"><input type="checkbox" name="remember"> Remember me</label>
                        <!-- In your login form, replace the existing "Forgot password?" link with: -->
                        <a href="{{ url_for('forgot_password') }}" class="forgot-password">Forgot password?</a>
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                </form>
                <p class="register-prompt">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const passwordInput = document.querySelector('#loginPassword');
            const icon = this;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });
        // Auto-dismiss flash messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                setTimeout(() => {
                    alert.style.transition = 'opacity 0.5s';
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 500);
                }, 5000);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url("{{ url_for('static', filename='images/resume-bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            backdrop-filter: blur(4px);
        }

        .form-container {
            background: rgba(255, 255, 255, 0.25);
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(6px);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
        }

        p {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 14px;
        }

        input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #4b6cb7, #182848);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: linear-gradient(90deg, #182848, #4b6cb7);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #182848;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <h2>Reset Password</h2>
            <p>Enter your email to receive a reset link</p>
            <form method="POST" action="/reset-password">
                <input type="email" name="email" placeholder="your@email.com" required>
                <button type="submit" class="login-btn">Send Reset Link</button>
            </form>
            <a href="/login" class="back-link">← Back to Login</a>
        </div>
    </div>
</body>
</html>
